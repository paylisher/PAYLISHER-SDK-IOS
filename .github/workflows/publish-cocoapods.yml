name: Publish CocoaPods

# Mevcut Paylisher.podspec'i CocoaPods trunk'a yayınlar (pod trunk push).
# Release (XCFramework/SPM) akışından BAĞIMSIZDIR — ne zaman istersen elle tetiklersin.
#
# Ön koşullar:
#  - Paylisher.podspec'teki s.version'a karşılık gelen git tag'i ZATEN var olmalı
#    (podspec source o tag'e bakar: :tag => s.version).
#  - Repo secret: COCOAPODS_TRUNK_TOKEN (pod trunk register ile alınır).
#
# Neden CI: pod trunk push, pod'u DERLEYEREK lint yapar -> Xcode + iOS platformu gerekir.

on:
  workflow_dispatch: {}

jobs:
  publish:
    name: pod trunk push
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: iOS platformunu indir (16.1'de iOS SDK kırpılmışsa)
        # build/release workflow'larındaki ile aynı; runner'daki 16.1'de iOS yoksa indirir.
        run: |
          # Robust: '|| echo' maskesi YOK. downloadPlatform (Apple CDN) flaky olabilir ->
          # retry(3x) + xcrun ile GERCEK dogrulama + eksikse NET hata.
          echo "=== Xcode ==="; xcodebuild -version
          # DIKKAT: 'xcrun --show-sdk-path' YANILTICI (iOS SDK stub'i var ama platform yok).
          # ATLAMADAN, iOS'u HER ZAMAN indir (retry), sonra GERCEK destination ile dogrula.
          n=0
          until [ $n -ge 3 ]; do
            n=$((n+1)); echo "iOS platformu indiriliyor (deneme $n/3)..."
            xcodebuild -downloadPlatform iOS && { echo "downloadPlatform OK"; break; }
            echo "deneme $n basarisiz; $((n*20))s sonra..."; sleep $((n*20))
          done
          sleep 5
          DEST=$(xcodebuild -showdestinations -project Paylisher.xcodeproj -scheme Paylisher 2>&1 || true)
          if echo "$DEST" | grep -qiE "platform:iOS[^}]*not installed"; then
            echo "::error::iOS platformu HALA kurulu degil - downloadPlatform yetmedi."
            echo "$DEST" | grep -i "platform:iOS" | head
            xcodebuild -showsdks || true
            exit 1
          fi
          echo "OK: iOS destination hazir -> $(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)"

      - name: CocoaPods Trunk'a yayınla
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN secret tanımlı değil. Settings > Secrets > Actions'a ekleyin."
            exit 1
          fi
          pod trunk push Paylisher.podspec --allow-warnings

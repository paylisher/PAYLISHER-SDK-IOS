name: Build XCFramework

# GitHub'ın bulutundaki bir macOS makinesinde (runner) Paylisher.xcframework'ü
# derler ve indirilebilir bir "artifact" olarak yükler.
on:
  workflow_dispatch: {}              # Actions sekmesinden elle "Run workflow" butonu
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'       # 1.8.5
      - '[0-9]+.[0-9]+.[0-9]+-*'     # 1.8.5-beta.1, 1.8.5-RC.1 vb.

# Aynı tag/ref için üst üste tetiklenirse öncekini iptal et
concurrency:
  group: build-xcframework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Paylisher.xcframework
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Toolchain bilgisi
        run: |
          xcodebuild -version
          swift --version

      - name: SwiftPM onbellegi (paket indirmeyi hizlandirir)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: XCFramework build
        # xcodebuild komutlarının Apple Sertifikası istemesini engellemek için
        # imzalama zorunluluğunu ortam değişkenleri (env) seviyesinde kapatıyoruz.
        run: |
          chmod +x scripts/build_xcframework.sh
          ./scripts/build_xcframework.sh
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""

      - name: Cikti yukle (indirilebilir artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Paylisher-xcframework
          path: build/Paylisher.xcframework.zip
          retention-days: 14
          if-no-files-found: error

      - name: Build loglarini yukle (hata ayiklama icin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/logs/
          retention-days: 7
          if-no-files-found: ignore

name: Build XCFramework

# GitHub'in bulutundaki bir macOS makinesinde (runner) Paylisher.xcframework'u
# derler ve indirilebilir bir "artifact" olarak yukler.
# Senin bilgisayarinin Xcode surumunden tamamen bagimsizdir: build burada,
# GitHub'in Mac'inde olur; senin yerel makinen denklemde degildir.
#
# Asama 1 (bu dosya): build al + zip'i artifact olarak yukle. Release OLUSTURMAZ,
# repoya commit ATMAZ. Once bulutta guncel kodun bu tarifle derlendigini kanitlamak icin.
# Not: Firebase hicbir hedefe link'li degil -> build'e dahil edilmiyor (hafif/hizli).

on:
  workflow_dispatch: {}              # Actions sekmesinden elle "Run workflow" butonu
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'       # 1.8.5
      - '[0-9]+.[0-9]+.[0-9]+-*'     # 1.8.5-beta.1, 1.8.5-RC.1 vb.

# Ayni tag/ref icin ust uste tetiklenirse oncekini iptal et (gereksiz dakika yakma)
concurrency:
  group: build-xcframework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Paylisher.xcframework
    runs-on: macos-15
    timeout-minutes: 30              # bol bol yeter; Firebase derlenmiyor (hicbir hedef link'lemiyor)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Surum tutarlilik guard'i (tag == kaynak surumler)
        # Sadece bir TAG push'i ile tetiklendiginde calisir (workflow_dispatch'te atlanir).
        # Tag, kaynaktaki paylisherVersion ve podspec s.version ile birebir ayni degilse build'i
        # KIRMIZI yapar -> yanlis $sdk_package_version asla sessizce yayinlanmaz.
        # (paylisherVersion => hem $lib_version hem $sdk_package_version'i besler.)
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          PV=$(grep -E 'paylisherVersion[[:space:]]*=' Paylisher/Paylisher/PaylisherVersion.swift | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          PS=$(grep -E 's\.version[[:space:]]*=' Paylisher.podspec | head -1 | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")
          echo "tag=$TAG | paylisherVersion=$PV | podspec=$PS"
          if [ "$TAG" != "$PV" ] || [ "$TAG" != "$PS" ]; then
            echo "::error::Surum uyusmazligi! tag=$TAG, paylisherVersion=$PV, podspec=$PS. Once 'scripts/bump-version.sh $TAG' calistirip commit'leyin, sonra tag'i atin."
            exit 1
          fi
          echo "OK: surumler tutarli ($TAG)"

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Runner'da 16.1 yoksa bu adim hata verir ve mevcut surumleri loglar.
          # O durumda burayi listelenen bir 16.x'e (or. 16.2) cek; framework
          # "Build Libraries for Distribution" (library evolution) ile derlendigi
          # icin yeni bir 16.x tuketiciler acisindan guvenlidir.
          xcode-version: '16.1'

      - name: Ortam teshisi (iOS SDK/platform var mi?)
        run: |
          echo "=== Secili Xcode ==="
          xcodebuild -version
          swift --version
          echo "=== Kurulu Xcode'lar ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          echo "=== Mevcut SDK'lar (iOS burada gorunmeli) ==="
          xcodebuild -showsdks 2>&1 || true
          echo "=== iOS SDK yolu ==="
          xcrun --sdk iphoneos --show-sdk-path 2>&1 || echo "!!! iOS SDK BULUNAMADI"
          echo "=== Paylisher semasi icin mevcut destination'lar (iOS burada olmali) ==="
          xcodebuild -showdestinations -project Paylisher.xcodeproj -scheme Paylisher 2>&1 | head -60 || true

      - name: iOS platformunu indir (16.1'de iOS SDK kirpilmissa)
        run: |
          # Xcode 16+ ile platformlar indirilebilir. Runner'daki 16.1'de iOS SDK yoksa cek.
          # Zaten varsa bu adim hizlica gecer / zararsizdir.
          xcodebuild -downloadPlatform iOS 2>&1 || echo "downloadPlatform basarisiz/gereksiz olabilir - yukaridaki teshis ciktisina bak"

      - name: SwiftPM onbellegi (paket indirmeyi hizlandirir)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: XCFramework build
        run: |
          chmod +x scripts/build_xcframework.sh
          ./scripts/build_xcframework.sh

      - name: Cikti yukle (indirilebilir artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Paylisher-xcframework
          path: build/Paylisher.xcframework.zip
          retention-days: 14
          if-no-files-found: error

      - name: Build loglarini yukle (hata ayiklama icin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/logs/
          retention-days: 7
          if-no-files-found: ignore
